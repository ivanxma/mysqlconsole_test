<section class="panel chart-toolbar-panel" data-monitoring-refresh>
  <div class="chart-toolbar">
    <div class="chart-toolbar-controls">
      <fieldset class="chart-period-field">
        <legend>Auto Refresh</legend>
        <div class="chart-period-options" data-monitoring-refresh-period-options>
          <label class="checkbox-field chart-period-option">
            <input name="monitoring_refresh_period" type="radio" value="0">
            <span>None</span>
          </label>
          <label class="checkbox-field chart-period-option">
            <input name="monitoring_refresh_period" type="radio" value="2">
            <span>2s</span>
          </label>
          <label class="checkbox-field chart-period-option">
            <input name="monitoring_refresh_period" type="radio" value="5">
            <span>5s</span>
          </label>
          <label class="checkbox-field chart-period-option">
            <input name="monitoring_refresh_period" type="radio" value="15">
            <span>15s</span>
          </label>
          <label class="checkbox-field chart-period-option">
            <input name="monitoring_refresh_period" type="radio" value="30">
            <span>30s</span>
          </label>
          <label class="checkbox-field chart-period-option">
            <input name="monitoring_refresh_period" type="radio" value="60">
            <span>60s</span>
          </label>
        </div>
      </fieldset>
    </div>
    <div class="chart-toolbar-status">
      <strong data-monitoring-refresh-updated>-</strong>
      <span class="helper-text" data-monitoring-refresh-status>Auto-refresh every 15s.</span>
    </div>
  </div>
</section>

<script>
  (() => {
    const panel = document.querySelector("[data-monitoring-refresh]");
    if (!panel) {
      return;
    }

    const storageKey = "dbconsole-monitoring-page-refresh-period";
    const allowedPeriods = [0, 2, 5, 15, 30, 60];
    const elements = {
      periodOptions: panel.querySelector("[data-monitoring-refresh-period-options]"),
      updated: panel.querySelector("[data-monitoring-refresh-updated]"),
      status: panel.querySelector("[data-monitoring-refresh-status]")
    };
    let timerId = null;
    let refreshPeriod = loadRefreshPeriod();

    function loadRefreshPeriod() {
      try {
        const storedValue = JSON.parse(window.localStorage.getItem(storageKey));
        const numericValue = Number(storedValue);
        return allowedPeriods.includes(numericValue) ? numericValue : 15;
      } catch (_) {
        return 15;
      }
    }

    function saveRefreshPeriod(value) {
      window.localStorage.setItem(storageKey, JSON.stringify(value));
    }

    function setStatus(message, isError = false) {
      elements.status.textContent = message;
      elements.status.classList.toggle("error-text", isError);
    }

    function updateTimestamp() {
      elements.updated.textContent = new Date().toLocaleTimeString();
    }

    function scheduleRefresh() {
      window.clearTimeout(timerId);
      timerId = null;
      if (!refreshPeriod) {
        setStatus("Auto-refresh off.");
        return;
      }
      setStatus(`Auto-refresh every ${refreshPeriod}s.`);
      timerId = window.setTimeout(() => {
        setStatus("Refreshing page...");
        window.location.reload();
      }, refreshPeriod * 1000);
    }

    function renderRefreshPeriodSelection() {
      elements.periodOptions.querySelectorAll("input[name='monitoring_refresh_period']").forEach((input) => {
        const isSelected = Number(input.value) === refreshPeriod;
        input.checked = isSelected;
        input.closest(".chart-period-option")?.classList.toggle("active", isSelected);
      });
    }

    elements.periodOptions.addEventListener("change", (event) => {
      const periodInput = event.target.closest("input[name='monitoring_refresh_period']");
      if (!periodInput) {
        return;
      }
      refreshPeriod = Number(periodInput.value);
      saveRefreshPeriod(refreshPeriod);
      renderRefreshPeriodSelection();
      scheduleRefresh();
      setStatus("Refreshing page...");
      window.location.reload();
    });

    updateTimestamp();
    renderRefreshPeriodSelection();
    scheduleRefresh();
    window.addEventListener("beforeunload", () => window.clearTimeout(timerId));
  })();
</script>
