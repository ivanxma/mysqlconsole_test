<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="login-page">
    <div class="page-shell">
      <main class="content-card auth-shell">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-stack">
              {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <section class="auth-panel">
          <div class="page-header">
            <p class="eyebrow">DBConsole</p>
            <h2>Change Local Admin Password</h2>
            <p>Set a new password for {{ local_admin_profile_name }}.</p>
          </div>

          <form method="post" class="form-grid" autocomplete="off">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <label>
              New Password
              <input name="new_local_admin_password" type="password" autocomplete="new-password" required>
            </label>
            <label>
              Confirm New Password
              <input name="confirm_local_admin_password" type="password" autocomplete="new-password" required>
            </label>
            <div class="form-actions">
              <button class="button primary" type="submit">Change Password</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
