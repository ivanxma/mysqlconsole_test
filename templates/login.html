<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="login-page">
    <div class="page-shell">
      <main class="content-card auth-shell">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-stack">
              {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <section class="auth-panel">
          <div class="page-header">
            <p class="eyebrow">DBConsole</p>
            <h2>{{ app_title }}</h2>
          <p>Connect to MySQL with a saved profile.</p>
        </div>

        <form method="post" class="form-grid" autocomplete="off">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <label class="full-span">
            Profile
            <select name="profile_picker" id="profile-picker" required>
              <option value="">Choose a saved profile</option>
              {% for profile in profiles %}
              <option value="{{ profile.name }}" {% if profile.name == selected_profile_name %}selected{% endif %}>{{ profile.name }}</option>
              {% endfor %}
            </select>
          </label>

          <label>
            MySQL Username
            <input name="username" id="username" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
          </label>
          <label>
            MySQL Password
            <input name="password" type="password" autocomplete="current-password">
          </label>

            <div class="form-actions">
              <button class="button primary" type="submit">Login</button>
            </div>
          </form>
        </section>
      </main>
    </div>

  </body>
</html>
